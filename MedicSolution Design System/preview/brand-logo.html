<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">

</head><body>
<div class="card">
  <div style="display:flex; gap:24px; align-items:center;">
    <div style="background:#fff; padding:20px; border:1px solid var(--border-1); border-radius:4px;">
      <img src="../assets/medic-solution_symbol.png" style="height:96px; display:block;">
    </div>
    <div style="background:var(--ms-navy-700); padding:20px; border-radius:4px;">
      <img src="../assets/medic-solution_symbol.png" style="height:96px; display:block; filter:brightness(0) invert(1);">
    </div>
    <div class="col" style="gap:8px;">
      <span style="font-family:var(--font-display); font-size:22px; font-weight:600; color:var(--ms-navy-700);">MS+ symbol</span>
      <span style="font-size:12px; color:var(--fg-2); line-height:1.5;">The only published mark. Tall portrait monogram with a medical "+" on the S.</span>
      <span class="mono" style="color:var(--fg-3); font-size:11px;">Navy 700 · #0b426a</span>
      <span class="mono" style="color:var(--fg-3); font-size:11px;">or knocked white on navy</span>
    </div>
  </div>
</div>
</body></html>
