<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">

</head><body>
<div class="card">
  <div class="col" style="gap:14px;">
    <div class="row" style="align-items:center; gap:12px;">
      <span class="mono" style="width:120px; flex:none;">--dur-fast</span>
      <span class="mono" style="width:60px; flex:none; color:var(--fg-3);">120ms</span>
      <span style="color:var(--fg-2); font-size:13px;">Colour transitions, hover swaps</span>
    </div>
    <div class="row" style="align-items:center; gap:12px;">
      <span class="mono" style="width:120px; flex:none;">--dur-base</span>
      <span class="mono" style="width:60px; flex:none; color:var(--fg-3);">200ms</span>
      <span style="color:var(--fg-2); font-size:13px;">Default — most state changes</span>
    </div>
    <div class="row" style="align-items:center; gap:12px;">
      <span class="mono" style="width:120px; flex:none;">--dur-slow</span>
      <span class="mono" style="width:60px; flex:none; color:var(--fg-3);">360ms</span>
      <span style="color:var(--fg-2); font-size:13px;">Drawer slides, modal entry</span>
    </div>
    <div class="row" style="align-items:center; gap:12px; padding-top:8px; border-top:1px solid var(--border-1);">
      <span class="mono" style="width:120px; flex:none;">--ease-out</span>
      <span class="mono" style="flex:1; color:var(--fg-3); font-size:11px;">cubic-bezier(0.2, 0.7, 0.2, 1)</span>
    </div>
    <span class="mono" style="color:var(--fg-3); font-size:11px;">No bounce. No overshoot. Modules don't spring.</span>
  </div>
</div>
</body></html>
