<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">

</head><body>
<div class="card">
  <div class="row" style="gap:12px;">
    <div style="flex:1; background:var(--ms-steel-050); padding:18px; border-radius:8px;">
      <div style="font-family:var(--font-display); font-size:36px; font-weight:500; color:var(--ms-navy-700); line-height:1;">50%</div>
      <div style="font-size:12px; color:var(--fg-2); margin-top:6px; line-height:1.4;">Reduction in delivery time vs site-built</div>
      <div class="mono" style="color:var(--fg-3); margin-top:14px; font-size:10px;">Flat tile</div>
    </div>
    <div style="flex:1; background:#fff; padding:18px; border:1px solid var(--border-1); border-radius:8px;">
      <span class="eyebrow" style="font-size:10px;">Healthcare</span>
      <div style="font-family:var(--font-display); font-size:18px; font-weight:500; margin-top:6px;">Södersjukhuset</div>
      <div style="font-size:12px; color:var(--fg-2); margin-top:4px; line-height:1.4;">Operating theatre extension, Stockholm</div>
      <div class="mono" style="color:var(--fg-3); margin-top:14px; font-size:10px;">Outlined</div>
    </div>
    <div style="flex:1; background:#fff; padding:18px; border-radius:8px; box-shadow:var(--shadow-2);">
      <span class="eyebrow" style="font-size:10px; color:var(--ms-indigo-600);">MAX24</span>
      <div style="font-family:var(--font-display); font-size:18px; font-weight:500; margin-top:6px;">≤24 h deployment</div>
      <div style="font-size:12px; color:var(--fg-2); margin-top:4px; line-height:1.4;">Truck, boat, train, plane</div>
      <div class="mono" style="color:var(--fg-3); margin-top:14px; font-size:10px;">Lifted (hover)</div>
    </div>
  </div>
</div>
</body></html>
