<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">

</head><body>
<div class="card">
  <div class="row" style="gap:12px; align-items:center; flex-wrap:wrap;">
    <button style="font-family:var(--font-body); font-size:14px; font-weight:500; padding:12px 22px; background:var(--ms-navy-700); color:#fff; border:1px solid var(--ms-navy-700); border-radius:4px; cursor:pointer;">Primary action</button>
    <button style="font-family:var(--font-body); font-size:14px; font-weight:500; padding:12px 22px; background:transparent; color:var(--ms-navy-700); border:1px solid var(--ms-navy-700); border-radius:4px; cursor:pointer;">Secondary</button>
    <button style="font-family:var(--font-body); font-size:14px; font-weight:500; padding:12px 22px; background:transparent; color:var(--ms-navy-700); border:1px solid transparent; border-radius:4px; cursor:pointer;">Ghost / link →</button>
    <button style="font-family:var(--font-body); font-size:14px; font-weight:500; padding:12px 22px; background:var(--ms-navy-700); color:#fff; border:1px solid var(--ms-navy-700); border-radius:4px; cursor:pointer; opacity:0.4;" disabled>Disabled</button>
  </div>
  <div class="row" style="gap:12px; align-items:center;">
    <button style="font-family:var(--font-body); font-size:12px; font-weight:500; padding:8px 16px; background:var(--ms-navy-700); color:#fff; border:0; border-radius:4px;">Small</button>
    <button style="font-family:var(--font-body); font-size:14px; font-weight:500; padding:12px 22px; background:var(--ms-navy-700); color:#fff; border:0; border-radius:4px;">Medium</button>
    <button style="font-family:var(--font-body); font-size:16px; font-weight:500; padding:16px 28px; background:var(--ms-navy-700); color:#fff; border:0; border-radius:4px;">Large</button>
  </div>
</div>
</body></html>
