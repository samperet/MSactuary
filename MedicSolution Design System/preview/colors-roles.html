<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">

</head><body>
<div class="card">
  <div class="row">
    <div class="col" style="flex:1; gap:6px;">
      <div style="font-size:11px; color:var(--fg-3); text-transform:uppercase; letter-spacing:0.08em;">Foreground</div>
      <div style="color: var(--fg-1); font-size:18px;">fg-1 · primary text</div>
      <div style="color: var(--fg-2); font-size:14px;">fg-2 · secondary</div>
      <div style="color: var(--fg-3); font-size:13px;">fg-3 · tertiary / captions</div>
      <div style="color: var(--fg-4); font-size:13px;">fg-4 · disabled</div>
    </div>
    <div class="col" style="flex:1; gap:6px;">
      <div style="font-size:11px; color:var(--fg-3); text-transform:uppercase; letter-spacing:0.08em;">Background</div>
      <div style="display:flex; gap:6px;">
        <div style="flex:1; height:32px; background:var(--bg-1); border:1px solid var(--border-1); display:flex; align-items:center; justify-content:center; font-size:11px;">bg-1</div>
        <div style="flex:1; height:32px; background:var(--bg-2); display:flex; align-items:center; justify-content:center; font-size:11px;">bg-2</div>
        <div style="flex:1; height:32px; background:var(--bg-3); display:flex; align-items:center; justify-content:center; font-size:11px;">bg-3</div>
      </div>
      <div style="display:flex; gap:6px;">
        <div style="flex:1; height:32px; background:var(--bg-bone); display:flex; align-items:center; justify-content:center; font-size:11px;">bg-bone</div>
        <div style="flex:1; height:32px; background:var(--bg-navy); color:#fff; display:flex; align-items:center; justify-content:center; font-size:11px;">bg-navy</div>
      </div>
    </div>
  </div>
</div>
</body></html>
