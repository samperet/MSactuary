<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">

</head><body>
<div class="card">
  <div style="background:var(--ms-steel-050); padding:32px; border-radius:8px;">
    <span class="eyebrow" style="color:var(--ms-navy-700);">Swedish quality — Reliable delivery</span>
    <div class="row" style="gap:24px; margin-top:18px;">
      <div class="col" style="flex:1; gap:4px;">
        <span style="font-family:var(--font-display); font-size:48px; font-weight:500; line-height:1; color:var(--ms-navy-700); letter-spacing:-0.022em;">100%</span>
        <span style="font-size:11px; color:var(--fg-2); line-height:1.3;">Swedish production</span>
      </div>
      <div class="col" style="flex:1; gap:4px;">
        <span style="font-family:var(--font-display); font-size:48px; font-weight:500; line-height:1; color:var(--ms-navy-700); letter-spacing:-0.022em;">40+</span>
        <span style="font-size:11px; color:var(--fg-2); line-height:1.3;">Years experience</span>
      </div>
      <div class="col" style="flex:1; gap:4px;">
        <span style="font-family:var(--font-display); font-size:48px; font-weight:500; line-height:1; color:var(--ms-navy-700); letter-spacing:-0.022em;">30+</span>
        <span style="font-size:11px; color:var(--fg-2); line-height:1.3;">Countries delivered</span>
      </div>
      <div class="col" style="flex:1; gap:4px;">
        <span style="font-family:var(--font-display); font-size:48px; font-weight:500; line-height:1; color:var(--ms-navy-700); letter-spacing:-0.022em;">0%</span>
        <span style="font-size:11px; color:var(--fg-2); line-height:1.3;">HSE (severe events)</span>
      </div>
    </div>
  </div>
</div>
</body></html>
