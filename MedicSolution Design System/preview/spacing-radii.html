<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">

</head><body>
<div class="card">
  <div class="row" style="gap:16px;">
    
      <div class="col" style="flex:1; align-items:center; gap:8px;">
        <div style="width:64px; height:64px; background:var(--ms-navy-100); border:1px solid var(--ms-navy-200); border-radius:0px;"></div>
        <span class="mono" style="font-size:11px;">0</span>
        <span style="font-size:10px; color:var(--fg-3); text-align:center; line-height:1.3;">Modules / dividers</span>
      </div>
    
      <div class="col" style="flex:1; align-items:center; gap:8px;">
        <div style="width:64px; height:64px; background:var(--ms-navy-100); border:1px solid var(--ms-navy-200); border-radius:2px;"></div>
        <span class="mono" style="font-size:11px;">1</span>
        <span style="font-size:10px; color:var(--fg-3); text-align:center; line-height:1.3;">Default surfaces</span>
      </div>
    
      <div class="col" style="flex:1; align-items:center; gap:8px;">
        <div style="width:64px; height:64px; background:var(--ms-navy-100); border:1px solid var(--ms-navy-200); border-radius:4px;"></div>
        <span class="mono" style="font-size:11px;">2</span>
        <span style="font-size:10px; color:var(--fg-3); text-align:center; line-height:1.3;">Buttons, inputs</span>
      </div>
    
      <div class="col" style="flex:1; align-items:center; gap:8px;">
        <div style="width:64px; height:64px; background:var(--ms-navy-100); border:1px solid var(--ms-navy-200); border-radius:8px;"></div>
        <span class="mono" style="font-size:11px;">3</span>
        <span style="font-size:10px; color:var(--fg-3); text-align:center; line-height:1.3;">Cards</span>
      </div>
    
      <div class="col" style="flex:1; align-items:center; gap:8px;">
        <div style="width:64px; height:64px; background:var(--ms-navy-100); border:1px solid var(--ms-navy-200); border-radius:12px;"></div>
        <span class="mono" style="font-size:11px;">4</span>
        <span style="font-size:10px; color:var(--fg-3); text-align:center; line-height:1.3;">Hero plates</span>
      </div>
    
      <div class="col" style="flex:1; align-items:center; gap:8px;">
        <div style="width:64px; height:64px; background:var(--ms-navy-100); border:1px solid var(--ms-navy-200); border-radius:999px;"></div>
        <span class="mono" style="font-size:11px;">pill</span>
        <span style="font-size:10px; color:var(--fg-3); text-align:center; line-height:1.3;">Pills / chips</span>
      </div>
    
  </div>
</div>
</body></html>
